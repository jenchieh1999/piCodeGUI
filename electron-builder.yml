appId: works.pi-agent.desktop
productName: Pi Agent Desktop
artifactName: Pi-Agent-Desktop-${version}-${os}-${arch}.${ext}
directories:
  output: release
files:
  - package.json
  - desktop/**/*
  - frontend/dist/**/*
  - pi-server/dist/**/*
extraResources:
  - from: node_modules/@earendil-works/pi-coding-agent/examples/extensions
    to: app.asar.unpacked/node_modules/@earendil-works/pi-coding-agent/examples/extensions
    filter:
      - "**/*"
asar: true
asarUnpack:
  - pi-server/dist/**/*
  - node_modules/**/*
afterPack: scripts/apply-windows-icon.cjs
npmRebuild: false
nodeGypRebuild: false
toolsets:
  winCodeSign: 1.1.0
win:
  icon: desktop/assets/pi-icon.ico
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
        - ia32
nsis:
  installerIcon: desktop/assets/pi-icon.ico
  uninstallerIcon: desktop/assets/pi-icon.ico
  buildUniversalInstaller: true
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
